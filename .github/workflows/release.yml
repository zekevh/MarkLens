name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          # Stamp the marketing version; CFBundleVersion was already bumped locally
          # via scripts/bump-version.sh before tagging.
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" Info.plist

      - name: Build (universal)
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64

      - name: Assemble .app bundle
        run: |
          APP="$RUNNER_TEMP/MarkLens.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Universal binary
          lipo \
            .build/arm64-apple-macosx/release/MarkLens \
            .build/x86_64-apple-macosx/release/MarkLens \
            -create -output "$APP/Contents/MacOS/MarkLens"
          chmod +x "$APP/Contents/MacOS/MarkLens"

          cp Info.plist "$APP/Contents/"

          # SPM resource bundle (Bundle.module resolves this at runtime)
          BUNDLE=".build/arm64-apple-macosx/release/MarkLens_MarkLens.bundle"
          if [ -d "$BUNDLE" ]; then
            cp -R "$BUNDLE" "$APP/Contents/Resources/"
            # Surface Assets.car at the bundle root so the OS resolves CFBundleIconName
            [ -f "$BUNDLE/Assets.car" ] && cp "$BUNDLE/Assets.car" "$APP/Contents/Resources/"
          fi

          echo "APP=$APP" >> $GITHUB_ENV

      - name: Ad-hoc sign
        run: |
          codesign \
            --sign - \
            --deep \
            --force \
            --options runtime \
            --entitlements MarkLens.entitlements \
            "$APP"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "MarkLens" \
            -srcfolder "$APP" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/MarkLens-${VERSION}.dmg"
          echo "DMG_PATH=$RUNNER_TEMP/MarkLens-${VERSION}.dmg" >> $GITHUB_ENV

      - name: Compute SHA256
        run: |
          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "SHA256=${SHA}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- DMG: \`MarkLens-${VERSION}.dmg\`" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256: \`${SHA256}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Update **Casks/marklens.rb** in homebrew-tap:" >> $GITHUB_STEP_SUMMARY
          echo '```ruby' >> $GITHUB_STEP_SUMMARY
          echo "  version \"${VERSION}\"" >> $GITHUB_STEP_SUMMARY
          echo "  sha256 \"${SHA256}\"" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
